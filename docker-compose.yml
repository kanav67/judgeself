services:
  postgres:
    image: postgres:16-alpine
    container_name: shared-postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - shared_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: shared-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: problem-service
      MINIO_ROOT_PASSWORD: problem-service-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - shared_minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "echo > /dev/tcp/localhost/9000"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: shared-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh -c
    command: >
      "mc alias set local http://minio:9000 problem-service problem-service-secret &&
      mc mb --ignore-existing local/problem-service-artifacts &&
      mc anonymous set none local/problem-service-artifacts"

volumes:
  shared_postgres_data:
  shared_minio_data: